<div class="toast-container" *ngIf="toastService.toast$ | async as toast">
  <div class="toast" [ngClass]="toast.tipo">
    <!-- Icono de Éxito -->
    <svg
      *ngIf="toast.tipo === 'success'"
      width="24"
      height="24"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
      <polyline points="22 4 12 14.01 9 11.01"></polyline>
    </svg>

    <!-- Icono de Error -->
    <svg
      *ngIf="toast.tipo === 'error'"
      width="24"
      height="24"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <circle cx="12" cy="12" r="10"></circle>
      <line x1="15" y1="9" x2="9" y2="15"></line>
      <line x1="9" y1="9" x2="15" y2="15"></line>
    </svg>

    <!-- Icono de Info -->
    <svg
      *ngIf="toast.tipo === 'info'"
      width="24"
      height="24"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <circle cx="12" cy="12" r="10"></circle>
      <line x1="12" y1="16" x2="12" y2="12"></line>
      <line x1="12" y1="8" x2="12.01" y2="8"></line>
    </svg>

    <!-- Icono de Pregunta -->
    <svg
      *ngIf="toast.tipo === 'confirm'"
      width="24"
      height="24"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <circle cx="12" cy="12" r="10"></circle>
      <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
      <line x1="12" y1="17" x2="12.01" y2="17"></line>
    </svg>

    <span class="toast-message">{{ toast.mensaje }}</span>

    <!-- Botones de Confirmación -->
    <div class="toast-actions" *ngIf="toast.tipo === 'confirm'">
      <button class="btn-cancel" (click)="toast.onCancel && toast.onCancel()">No</button>
      <button class="btn-confirm" (click)="toast.onConfirm && toast.onConfirm()">Sí</button>
    </div>

  </div>
</div>
